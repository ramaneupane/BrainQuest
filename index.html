<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainQuest</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>BrainQuest</h1>
      <p class="subtitle">A quick quiz to test your curiosity.</p>
      <section class="quiz-card">
        <h2 id="question">Loading question...</h2>
        <div id="options" class="options"></div>
        <p id="status" class="status">Choose an answer.</p>
        <button id="nextBtn" class="hidden">Next Question</button>
      </section>
      <p id="score" class="score">Score: 0/0</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
